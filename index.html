<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Next-generation server monitoring and management tools" />
    <link rel="icon" type="image/png" href="./SRProbe.png" />
    <title>SRProbe</title>
    <script>
      try {
        var t = localStorage.getItem('nodeget.theme')
        var isDark = t === 'dark' || (t === null && window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (isDark) {
          document.documentElement.classList.add('dark')
        }
      } catch (_) {}
    </script>
    <link rel="stylesheet" href="./custom.css" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="./custom.js" defer></script>
  </body>
</html>
